shadow = false;
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
inactive-opacity = 1;
frame-opacity = 1.0;
active-opacity = 1.0;
inactive-dim = 0.0;
focus-exclude = [];
inactive-dim-fixed = 1.0;
corner-radius = 0;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
blur-kern = "";
backend = "xrender";
vsync = true;
use-damage = true;
log-level = "warn";
